<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Android Terminal M3</title>
    
    <!-- Meta Tags PWA -->
    <meta name="theme-color" content="#141218">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.svg">
    
    <!-- Links Externos -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    
    <!-- Fontes Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Estilos -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container" id="app">
        <header class="top-app-bar">
            <div class="app-title">
                <div class="app-icon">>_</div>
                Terminal
            </div>
            <div class="status-pill">
                <div class="status-dot"></div>
                Material UI
            </div>
        </header>

        <main class="terminal-body" id="terminal-output" onclick="focusInput()">
            <!-- O output do terminal será injetado dinamicamente aqui -->
        </main>
    </div>

    <!-- Scripts -->
    <script src="app.js"></script>
</body>
</html>
